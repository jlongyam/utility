<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=9">
  <meta http-equiv="content-type" content="text/html">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>test</title>
  <script src="../../../script.js"></script>
  <script src="../../package.js"></script>
</head>
<body>
  <script>
    script({
      import: ['console/test.js'],
      context: { name: 'console' }
    }, function(package,d,w){
      var Console = package.console
      script.when('test', Console, function(){
        Console.test({
          call: function() {
            return 0
          },
          should: 0
        })
        Console.test({
          name: 'false',
          call: function() {
            return false
          },
          should: false
        })
        Console.test({
          context: 'Boolean',
          name: 'true',
          call: function() {
            return true
          },
          should: true
        })
      })
    })
  </script>
</body>
</html>
