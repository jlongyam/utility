<!DOCTYPE html>
<html>
<head>
    <title>console.dirxml() Test</title>
    <link href="../src/console.css" rel="stylesheet"> 
    <script src="../src/console.js"></script>
</head>
<body>
    <div id="container">
        <h1>console.dirxml() Examples</h1>
        <div class="sample" data-test="example">
            <p>This is a sample paragraph</p>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </div>
        <form id="testForm">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        // Simple element
        console.log("Simple element:");
        console.dirxml(document.querySelector('p'));
        
        // Element with children
        console.log("\nElement with children:");
        console.dirxml(document.querySelector('.sample'));
        
        // Form element
        console.log("\nForm element:");
        console.dirxml(document.getElementById('testForm'));
        
        // Entire document
        console.log("\nDocument:");
        console.dirxml(document);
        
        // Document fragment
        console.log("\nDocument fragment:");
        const fragment = document.createDocumentFragment();
        const div = document.createElement('div');
        div.innerHTML = '<span>Fragment content</span>';
        fragment.appendChild(div);
        console.dirxml(fragment);
        
        // Non-element node
        console.log("\nText node:");
        const textNode = document.createTextNode('Sample text node');
        console.dirxml(textNode);
        
        // Comment node
        console.log("\nComment node:");
        const comment = document.createComment('Sample comment');
        console.dirxml(comment);
    </script>
</body>
</html>
